$kind: http-request
name: GetBalance
url: "{{payments_url}}/accounts/balance"
method: GET
headers:
  X-User-Id: "{{user_id}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"статус 200\", () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      const response = pm.response.json();\r

      \r

      pm.test(\"New Balance is still the same 150\", function () {\r

      \    pm.expect(response.balance).to.eql(150.0);\r

      });"
    language: text/javascript
