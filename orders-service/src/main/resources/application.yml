server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:orders-db}:5432/orders_db?sslmode=disable&connectTimeout=10&socketTimeout=30
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:orders-service}
    topics:
      payment-requested: ${PAYMENT_REQUESTED_TOPIC:order.payment.requested}
      payment-completed: ${PAYMENT_COMPLETED_TOPIC:order.payment.completed}
      payment-failed: ${PAYMENT_FAILED_TOPIC:order.payment.failed}
    outbox-delay-msec: 2000
    max-retry-count: 10

logging:
  level:
    org.apache.kafka: WARN

rates:
  price-to-aoi:
    archive: 100
    tasking: 200
    monitoring: 300